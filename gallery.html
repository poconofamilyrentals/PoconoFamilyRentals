      const nav = document.querySelector("[data-room-nav]");
      const container = document.querySelector("[data-photo-sections]");

      sections.forEach((section, sectionIndex) => {
        const slug = section.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
        const navLink = document.createElement("a");
        navLink.href = `#${slug}`;
        navLink.textContent = section.title;
        nav.append(navLink);

        const sectionEl = document.createElement("section");
        sectionEl.className = "room-photo-section";
        sectionEl.id = slug;

        const heading = document.createElement("div");
        heading.className = "room-photo-heading";
        heading.innerHTML = `<p class="eyebrow">${String(section.photos.length).padStart(2, "0")} photos</p><h2>${section.title}</h2><p>${section.highlights}</p>`;
        sectionEl.append(heading);

        const grid = document.createElement("div");
        grid.className = "airbnb-photo-grid";

        section.photos.forEach(([src, caption], photoIndex) => {
          const figure = document.createElement("figure");
          figure.className = "photo-card";

          const link = document.createElement("a");
          link.href = src;
          link.target = "_blank";
          link.rel = "noreferrer";

          const img = document.createElement("img");
          img.src = src;
          img.alt = caption;
          if (sectionIndex > 0 || photoIndex > 3) img.loading = "lazy";

          const figcaption = document.createElement("figcaption");
          figcaption.textContent = caption;

          link.append(img);
          figure.append(link, figcaption);
          grid.append(figure);
        });

        sectionEl.append(grid);
        container.append(sectionEl);
      });
